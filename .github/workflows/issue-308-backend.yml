name: Issue 308 Share Security

on:
  push:
    branches: [main]
    paths:
      - scripts/issue-308-backend.py
      - .github/workflows/issue-308-backend.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: issue-308-share-security-main
  cancel-in-progress: false

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Apply backend patch
        run: python scripts/issue-308-backend.py

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend TypeScript check
        working-directory: backend
        run: npm run build:tsc

      - name: Share security regression tests
        working-directory: backend
        run: node --import tsx --test tests/share-security-capabilities.test.ts tests/attachment-shared-access.test.ts tests/notebook-directory-permissions.test.ts

      - name: Backend production bundle
        working-directory: backend
        run: npm run build

      - name: Commit validated implementation
        run: |
          rm -f scripts/issue-308-backend.py .github/workflows/issue-308-backend.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 1
          fi
          git commit -m "fix(sharing): enforce share security and lifecycle (#308)"
          git push origin HEAD:main
