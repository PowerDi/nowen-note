name: Fix issue 311 bubble menu overlap

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/issue-311-fix.yml

permissions:
  contents: write

concurrency:
  group: issue-311-main-fix
  cancel-in-progress: false

jobs:
  fix-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply selection bubble fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          editor_path = Path('frontend/src/components/TiptapEditor.tsx')
          source = editor_path.read_text(encoding='utf-8')

          replacements = [
              (
                  'import { TextSelection, NodeSelection } from "@tiptap/pm/state";\n',
                  'import { TextSelection, NodeSelection } from "@tiptap/pm/state";\nimport { CellSelection } from "@tiptap/pm/tables";\n',
              ),
              (
                  'import { cn } from "@/lib/utils";\n',
                  'import { cn } from "@/lib/utils";\nimport { resolveEditorBubbleKind, type BubbleSelectionKind } from "@/lib/editorBubbleSelection";\n',
              ),
          ]
          for old, new in replacements:
              if source.count(old) != 1:
                  raise SystemExit(f'Expected exactly one import match: {old!r}, got {source.count(old)}')
              source = source.replace(old, new, 1)

          focus_guard = '''      if (!view.hasFocus()) {
        setBubble(b => b.open ? { ...b, open: false } : b);
        setImageBubble(b => b.open ? { ...b, open: false } : b);
        setLinkBubble(b => b.open ? { ...b, open: false } : b);
        setTableBubble(b => b.open ? { ...b, open: false } : b);
        return;
      }

'''
          decision = '''      if (!view.hasFocus()) {
        setBubble(b => b.open ? { ...b, open: false } : b);
        setImageBubble(b => b.open ? { ...b, open: false } : b);
        setLinkBubble(b => b.open ? { ...b, open: false } : b);
        setTableBubble(b => b.open ? { ...b, open: false } : b);
        return;
      }

      const selectionKind: BubbleSelectionKind = empty
        ? "empty"
        : selection instanceof CellSelection
          ? "cell"
          : selection instanceof NodeSelection && selection.node.type.name === "image"
            ? "image"
            : selection instanceof TextSelection
              ? "text"
              : "other";
      const selectedText = selectionKind === "text"
        ? state.doc.textBetween(from, to, " ")
        : "";
      const bubbleKind = resolveEditorBubbleKind({
        selectionKind,
        tableActive: editor.isActive("table"),
        linkActive: editor.isActive("link"),
        hasVisibleText: selectedText.trim().length > 0,
      });

'''
          if source.count(focus_guard) != 1:
              raise SystemExit(f'Expected one focus guard, got {source.count(focus_guard)}')
          source = source.replace(focus_guard, decision, 1)

          if source.count('        if (editor.isActive("table")) {') != 1:
              raise SystemExit('Unexpected empty-selection table condition count')
          source = source.replace('        if (editor.isActive("table")) {', '        if (bubbleKind === "table") {', 1)

          empty_link_anchor = '''        if (editor.isActive("link")) {
'''
          empty_link_replacement = '''        if (bubbleKind === "table") {
          setLinkBubble(b => (b.open && b.source === "caret") ? { ...b, open: false } : b);
          return;
        }

        if (bubbleKind === "link") {
'''
          if source.count(empty_link_anchor) != 1:
              raise SystemExit(f'Expected one empty link condition, got {source.count(empty_link_anchor)}')
          source = source.replace(empty_link_anchor, empty_link_replacement, 1)

          old_table_start = '''      // Keep table bubble open when cells are selected
      if (editor.isActive("table")) {
        const rect = posToDOMRect(view, from, to);
'''
          new_table_start = '''      // CellSelection owns the table bubble. TextSelection inside a cell must stay textual.
      if (bubbleKind === "table") {
        setBubble(b => b.open ? { ...b, open: false } : b);
        setImageBubble(b => b.open ? { ...b, open: false } : b);
        const rect = posToDOMRect(view, from, to);
'''
          if source.count(old_table_start) != 1:
              raise SystemExit(f'Expected one selected table branch, got {source.count(old_table_start)}')
          source = source.replace(old_table_start, new_table_start, 1)

          old_table_end = '''        setTableBubble({ open: true, top, left, cellText });
      } else {
'''
          new_table_end = '''        setTableBubble({ open: true, top, left, cellText });
        return;
      } else {
'''
          if source.count(old_table_end) != 1:
              raise SystemExit(f'Expected one selected table branch end, got {source.count(old_table_end)}')
          source = source.replace(old_table_end, new_table_end, 1)

          image_branch = '''      const isImage = editor.isActive("image");

      if (isImage) {
'''
          if source.count(image_branch) != 1:
              raise SystemExit(f'Expected one image branch, got {source.count(image_branch)}')
          source = source.replace(image_branch, '      if (bubbleKind === "image") {\n', 1)

          text_extract = '''        const text = state.doc.textBetween(from, to, " ");
'''
          if source.count(text_extract) != 1:
              raise SystemExit(f'Expected one selected text extraction, got {source.count(text_extract)}')
          source = source.replace(text_extract, '        const text = selectedText;\n', 1)

          editor_path.write_text(source, encoding='utf-8')

          helper = '''export type BubbleSelectionKind = "empty" | "text" | "cell" | "image" | "other";
export type EditorBubbleKind = "none" | "text" | "table" | "image" | "link";

export interface EditorBubbleDecisionInput {
  selectionKind: BubbleSelectionKind;
  tableActive: boolean;
  linkActive: boolean;
  hasVisibleText: boolean;
}

/**
 * Resolve exactly one editor bubble for the current ProseMirror selection.
 * Structural selections have priority over contextual node ancestry so a
 * TextSelection inside a table remains a text operation, not a cell operation.
 */
export function resolveEditorBubbleKind(input: EditorBubbleDecisionInput): EditorBubbleKind {
  switch (input.selectionKind) {
    case "cell":
      return "table";
    case "image":
      return "image";
    case "text":
      return input.hasVisibleText ? "text" : "none";
    case "empty":
      if (input.tableActive) return "table";
      if (input.linkActive) return "link";
      return "none";
    default:
      return "none";
  }
}
'''
          Path('frontend/src/lib/editorBubbleSelection.ts').write_text(helper, encoding='utf-8')

          test = '''import { describe, expect, it } from "vitest";
import { resolveEditorBubbleKind } from "../editorBubbleSelection";

describe("resolveEditorBubbleKind", () => {
  it("keeps a TextSelection inside a table as text-only", () => {
    expect(resolveEditorBubbleKind({
      selectionKind: "text",
      tableActive: true,
      linkActive: false,
      hasVisibleText: true,
    })).toBe("text");
  });

  it("shows only the table bubble for a CellSelection", () => {
    expect(resolveEditorBubbleKind({
      selectionKind: "cell",
      tableActive: true,
      linkActive: false,
      hasVisibleText: true,
    })).toBe("table");
  });

  it("gives an image NodeSelection priority inside a table", () => {
    expect(resolveEditorBubbleKind({
      selectionKind: "image",
      tableActive: true,
      linkActive: false,
      hasVisibleText: false,
    })).toBe("image");
  });

  it("keeps an empty table caret mutually exclusive with a link bubble", () => {
    expect(resolveEditorBubbleKind({
      selectionKind: "empty",
      tableActive: true,
      linkActive: true,
      hasVisibleText: false,
    })).toBe("table");
  });

  it("shows a caret link bubble outside tables", () => {
    expect(resolveEditorBubbleKind({
      selectionKind: "empty",
      tableActive: false,
      linkActive: true,
      hasVisibleText: false,
    })).toBe("link");
  });

  it("does not show a text bubble for invisible-only selections", () => {
    expect(resolveEditorBubbleKind({
      selectionKind: "text",
      tableActive: true,
      linkActive: false,
      hasVisibleText: false,
    })).toBe("none");
  });
});
'''
          test_path = Path('frontend/src/lib/__tests__/editorBubbleSelection.test.ts')
          test_path.parent.mkdir(parents=True, exist_ok=True)
          test_path.write_text(test, encoding='utf-8')
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run focused regression tests
        working-directory: frontend
        run: npm run test:run -- src/lib/__tests__/editorBubbleSelection.test.ts

      - name: Run frontend production build
        working-directory: frontend
        run: npm run build

      - name: Commit validated fix to main
        run: |
          rm -f .github/issue-311-selection.txt
          rm -f .github/workflows/issue-311-inspect.yml
          rm -f .github/workflows/issue-311-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "fix(editor): keep table and text bubble menus mutually exclusive (#311)"
          git push origin HEAD:main
