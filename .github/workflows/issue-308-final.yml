name: Issue 308 Final Consistency

on:
  push:
    branches: [main]
    paths:
      - scripts/issue-308-final.py
      - .github/workflows/issue-308-final.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: issue-308-final-main
  cancel-in-progress: false

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Apply, validate and commit
        shell: bash
        run: |
          set +e
          LOG=/tmp/issue-308-final.log
          : > "$LOG"
          phase="apply_patch"
          status=0
          python scripts/issue-308-final.py >>"$LOG" 2>&1 || status=$?
          if [ "$status" -eq 0 ]; then phase="npm_ci"; (cd backend && npm ci) >>"$LOG" 2>&1 || status=$?; fi
          if [ "$status" -eq 0 ]; then phase="typescript"; (cd backend && npm run build:tsc) >>"$LOG" 2>&1 || status=$?; fi
          if [ "$status" -eq 0 ]; then phase="route_test"; (cd backend && node --import tsx --test tests/single-share-route-session-limit.test.ts tests/share-security-capabilities.test.ts) >>"$LOG" 2>&1 || status=$?; fi
          if [ "$status" -eq 0 ]; then phase="bundle"; (cd backend && npm run build) >>"$LOG" 2>&1 || status=$?; fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$status" -ne 0 ]; then
            tail -n 350 "$LOG" >/tmp/issue-308-final-tail.log
            git reset --hard HEAD
            python - "$phase" "$status" <<'PY'
          import json, pathlib, sys
          phase, status = sys.argv[1], int(sys.argv[2])
          tail = pathlib.Path('/tmp/issue-308-final-tail.log').read_text(encoding='utf-8', errors='replace')
          pathlib.Path('.github/issue-308-final-result.json').write_text(
              json.dumps({'ok': False, 'phase': phase, 'status': status, 'logTail': tail}, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY
            git add .github/issue-308-final-result.json
            git commit -m "chore(issue-308): record final validation failure"
            git pull --rebase origin main
            git push origin HEAD:main
            cat /tmp/issue-308-final-tail.log
            exit "$status"
          fi

          rm -f .github/issue-308-final-result.json scripts/issue-308-final.py .github/workflows/issue-308-final.yml
          git add -A
          git commit -m "fix(sharing): keep counted sessions valid at view limit (#308)"
          git pull --rebase origin main
          git push origin HEAD:main
