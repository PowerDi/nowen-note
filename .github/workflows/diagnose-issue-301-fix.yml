name: Diagnose Issue 301 Fix

on:
  push:
    branches: [main]
    paths:
      - .github/issue-301-diagnostic-trigger

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply patch, validate, and record result
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path

          text = Path('.github/workflows/fix-issue-301-direct.yml').read_text(encoding='utf-8')
          marker = '      - name: Implement stable async editor insert anchors\n'
          start = text.index(marker)
          run_marker = '        run: |\n'
          body_start = text.index(run_marker, start) + len(run_marker)
          end = text.index('\n      - name: Test and typecheck frontend', body_start)
          block = text[body_start:end]
          lines = []
          for line in block.splitlines():
              lines.append(line[10:] if line.startswith('          ') else line)
          Path('/tmp/issue-301-patch.sh').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

          bash /tmp/issue-301-patch.sh > /tmp/issue-301.log 2>&1
          PATCH=$?
          INSTALL=99
          TEST=99
          TYPECHECK=99

          if [ "$PATCH" -eq 0 ]; then
            cd frontend
            npm ci >> /tmp/issue-301.log 2>&1
            INSTALL=$?
            if [ "$INSTALL" -eq 0 ]; then
              npm run test:run -- src/lib/__tests__/asyncEditorInsert.test.ts >> /tmp/issue-301.log 2>&1
              TEST=$?
              npx tsc -b --pretty false >> /tmp/issue-301.log 2>&1
              TYPECHECK=$?
            fi
            cd ..
          fi

          python3 - <<PY
          import json
          from pathlib import Path
          statuses = {
              'patch': int('$PATCH'),
              'install': int('$INSTALL'),
              'test': int('$TEST'),
              'typecheck': int('$TYPECHECK'),
          }
          log = Path('/tmp/issue-301.log').read_text(encoding='utf-8', errors='replace')
          Path('/tmp/issue-301-result.json').write_text(
              json.dumps({
                  'ok': all(value == 0 for value in statuses.values()),
                  'statuses': statuses,
                  'log': '\n'.join(log.splitlines()[-260:]),
              }, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

          OK=$(python3 -c "import json; print('1' if json.load(open('/tmp/issue-301-result.json'))['ok'] else '0')")
          if [ "$OK" = "1" ]; then
            rm -f .github/issue-301-direct-fix-trigger
            rm -f .github/issue-301-diagnostic-trigger
            rm -f .github/workflows/fix-issue-301-direct.yml
            rm -f .github/workflows/diagnose-issue-301-fix.yml
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git commit -m "fix(editor): preserve async insert position after dividers (#301)" -m "Fixes #301"
            git push origin HEAD:main
            exit $?
          fi

          git reset --hard HEAD
          mkdir -p .github
          cp /tmp/issue-301-result.json .github/issue-301-fix-result.json
          rm -f .github/issue-301-diagnostic-trigger
          rm -f .github/workflows/diagnose-issue-301-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test(editor): record issue 301 fix diagnostics"
          git push origin HEAD:main
