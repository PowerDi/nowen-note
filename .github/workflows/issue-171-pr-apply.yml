name: Apply issue 171 from PR event

on:
  pull_request_target:
    types:
      - opened
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'chore/trigger-issue-171'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract and run implementation script
        shell: bash
        run: |
          python3 - <<'PYEXTRACT'
          from pathlib import Path

          source = Path('.github/workflows/issue-171-apply.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(source) if line.strip() == "python3 - <<'PY'")
          end = next(i for i in range(start + 1, len(source)) if source[i].strip() == 'PY')
          block = []
          for line in source[start:end + 1]:
              block.append(line[10:] if line.startswith('          ') else line)
          Path('/tmp/apply-issue-171.sh').write_text('\n'.join(block) + '\n', encoding='utf-8')
          PYEXTRACT
          bash /tmp/apply-issue-171.sh

      - name: Validate and publish
        shell: bash
        run: |
          git diff --check
          grep -q 'version: 44' backend/src/db/migrations.ts
          grep -q 'notes.icon' backend/src/routes/notes.ts
          grep -q 'change_note_icon' frontend/src/components/ContextMenu.tsx
          test -f frontend/src/components/NoteIconPickerModal.tsx

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/issue-171-apply.yml .github/workflows/issue-171-pr-apply.yml
          git add backend frontend packages
          git commit -m "feat(notes): add per-note icons (#171)"
          git push origin HEAD:main
          git push origin --delete chore/trigger-issue-171 || true
