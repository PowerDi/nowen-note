name: Fix issue 311 selection bubbles

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/issue-311-inspect.yml

permissions:
  contents: write

concurrency:
  group: issue-311-final-fix
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply, validate and publish
        shell: bash
        run: |
          set +e
          LOG="$RUNNER_TEMP/issue-311.log"
          : > "$LOG"

          python3 .github/scripts/apply-issue-311.py >>"$LOG" 2>&1
          APPLY=$?
          INSTALL=99
          TEST=99
          BUILD=99

          if [ "$APPLY" -eq 0 ]; then
            (cd frontend && npm ci) >>"$LOG" 2>&1
            INSTALL=$?
          fi
          if [ "$INSTALL" -eq 0 ]; then
            (cd frontend && npm run test:run -- src/lib/__tests__/editorBubbleSelection.test.ts) >>"$LOG" 2>&1
            TEST=$?
          fi
          if [ "$TEST" -eq 0 ]; then
            (cd frontend && npm run build) >>"$LOG" 2>&1
            BUILD=$?
          fi

          printf '\napply=%s\ninstall=%s\ntest=%s\nbuild=%s\n' "$APPLY" "$INSTALL" "$TEST" "$BUILD" >>"$LOG"

          if [ "$APPLY" -eq 0 ] && [ "$INSTALL" -eq 0 ] && [ "$TEST" -eq 0 ] && [ "$BUILD" -eq 0 ]; then
            rm -f .github/issue-311-selection.txt
            rm -f .github/issue-311-fix-result.txt
            rm -f .github/issue-311-failure.txt
            rm -f .github/scripts/apply-issue-311.py
            rm -f .github/workflows/issue-311-inspect.yml
            rm -f .github/workflows/issue-311-fix.yml
            rm -f .github/workflows/issue-311-diagnose.yml

            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add -A
            git diff --cached --check >>"$LOG" 2>&1
            CHECK=$?
            if [ "$CHECK" -ne 0 ]; then
              APPLY=98
            else
              git commit -m "fix(editor): keep table and text bubble menus mutually exclusive (#311)" >>"$LOG" 2>&1
              COMMIT=$?
              if [ "$COMMIT" -eq 0 ]; then
                git pull --rebase origin main >>"$LOG" 2>&1
                REBASE=$?
                if [ "$REBASE" -eq 0 ]; then
                  (cd frontend && npm run test:run -- src/lib/__tests__/editorBubbleSelection.test.ts) >>"$LOG" 2>&1
                  RETEST=$?
                  if [ "$RETEST" -eq 0 ]; then
                    git push origin HEAD:main >>"$LOG" 2>&1
                    PUSH=$?
                    if [ "$PUSH" -eq 0 ]; then
                      exit 0
                    fi
                  fi
                fi
              fi
            fi
          fi

          git rebase --abort >/dev/null 2>&1 || true
          git reset --hard origin/main >/dev/null 2>&1 || git reset --hard HEAD >/dev/null 2>&1
          cp "$LOG" .github/issue-311-failure.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/issue-311-failure.txt
          git commit -m "chore(issue-311): capture bubble fix failure" >/dev/null 2>&1 || true
          git pull --rebase origin main >/dev/null 2>&1 || true
          git push origin HEAD:main >/dev/null 2>&1 || true
          exit 0
