name: Validate Phase 2-3 Final 2

on:
  push:
    branches: [main]
    paths:
      - .github/phase23-final2-trigger

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Run validation
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/phase23-final2
          (cd backend && npm ci && npm run build && node --import tsx --test tests/api-token-resource-scope.test.ts) > /tmp/phase23-final2/backend.log 2>&1
          BACKEND=$?
          (cd frontend && npm ci && npm run build) > /tmp/phase23-final2/frontend.log 2>&1
          FRONTEND=$?
          (cd packages/nowen-mcp && npm ci && npm test) > /tmp/phase23-final2/mcp.log 2>&1
          MCP=$?
          python3 - <<PY
          import json
          from pathlib import Path
          statuses = {"backend": int("$BACKEND"), "frontend": int("$FRONTEND"), "mcp": int("$MCP")}
          logs = {}
          for name in statuses:
              text = Path(f"/tmp/phase23-final2/{name}.log").read_text(encoding="utf-8", errors="replace")
              logs[name] = "\n".join(text.splitlines()[-180:])
          Path(".github/phase23-final2-validation.json").write_text(
              json.dumps({"ok": all(v == 0 for v in statuses.values()), "statuses": statuses, "logs": logs}, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          rm -f .github/phase23-final2-trigger
          rm -f .github/workflows/validate-phase23-final2.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test(mcp): record Phase 2-3 revalidation"
          git push origin HEAD:main
